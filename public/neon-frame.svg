<svg xmlns="http://www.w3.org/2000/svg" width="508" height="508" viewBox="0 0 508 508">
    <defs>
        <!-- Neon Glow Filter -->
        <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur5"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur10"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur20"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="40" result="blur40"/>
            <feMerge>
                <feMergeNode in="blur40"/>
                <feMergeNode in="blur20"/>
                <feMergeNode in="blur10"/>
                <feMergeNode in="blur5"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <!-- Gradients -->
        <linearGradient id="gradient-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ffff" stop-opacity="1" />
            <stop offset="50%" stop-color="#00d4ff" stop-opacity="1" />
            <stop offset="100%" stop-color="#0099ff" stop-opacity="1" />
        </linearGradient>

        <linearGradient id="gradient-pink" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff00ff" stop-opacity="1" />
            <stop offset="50%" stop-color="#ff66ff" stop-opacity="1" />
            <stop offset="100%" stop-color="#ff99ff" stop-opacity="1" />
        </linearGradient>

        <linearGradient id="gradient-purple" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#9d00ff" stop-opacity="1" />
            <stop offset="50%" stop-color="#b300ff" stop-opacity="1" />
            <stop offset="100%" stop-color="#cc00ff" stop-opacity="1" />
        </linearGradient>
    </defs>

    <style>
        @keyframes pulse-cyan {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 1; }
        }
        @keyframes pulse-pink {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
        }
        @keyframes pulse-purple {
        0%, 100% { opacity: 0.9; }
        50% { opacity: 0.6; }
        }
    </style>

    <!-- Top Left Corner -->
    <path d="M 4 50 L 4 4 L 50 4"
          stroke="url(#gradient-cyan)"
          stroke-width="3"
          fill="none"
          filter="url(#neon-glow)"
          style="animation: pulse-cyan 2s ease-in-out infinite;" />

    <!-- Top Right Corner -->
    <path d="M 458 4 L 504 4 L 504 50"
          stroke="url(#gradient-pink)"
          stroke-width="3"
          fill="none"
          filter="url(#neon-glow)"
          style="animation: pulse-pink 2.5s ease-in-out infinite;" />

    <!-- Bottom Left Corner -->
    <path d="M 4 458 L 4 504 L 50 504"
          stroke="url(#gradient-purple)"
          stroke-width="3"
          fill="none"
          filter="url(#neon-glow)"
          style="animation: pulse-purple 3s ease-in-out infinite;" />

    <!-- Bottom Right Corner -->
    <path d="M 504 458 L 504 504 L 458 504"
          stroke="url(#gradient-cyan)"
          stroke-width="3"
          fill="none"
          filter="url(#neon-glow)"
          style="animation: pulse-cyan 2.3s ease-in-out infinite;" />

    <!-- Animated Border Lines -->
    <line x1="4" y1="100" x2="4" y2="400"
          stroke="url(#gradient-cyan)"
          stroke-width="2"
          filter="url(#neon-glow)"
          opacity="0.6">
        <animate attributeName="y1" values="50;100;50" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="450;400;450" dur="4s" repeatCount="indefinite"/>
    </line>

    <line x1="504" y1="100" x2="504" y2="400"
          stroke="url(#gradient-pink)"
          stroke-width="2"
          filter="url(#neon-glow)"
          opacity="0.6">
        <animate attributeName="y1" values="100;50;100" dur="4.5s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="400;450;400" dur="4.5s" repeatCount="indefinite"/>
    </line>

    <line x1="100" y1="4" x2="400" y2="4"
          stroke="url(#gradient-purple)"
          stroke-width="2"
          filter="url(#neon-glow)"
          opacity="0.6">
        <animate attributeName="x1" values="50;100;50" dur="3.8s" repeatCount="indefinite"/>
        <animate attributeName="x2" values="450;400;450" dur="3.8s" repeatCount="indefinite"/>
    </line>

    <line x1="100" y1="504" x2="400" y2="504"
          stroke="url(#gradient-cyan)"
          stroke-width="2"
          filter="url(#neon-glow)"
          opacity="0.6">
        <animate attributeName="x1" values="100;50;100" dur="4.2s" repeatCount="indefinite"/>
        <animate attributeName="x2" values="400;450;400" dur="4.2s" repeatCount="indefinite"/>
    </line>
</svg>